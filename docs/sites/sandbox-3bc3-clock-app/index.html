<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字时钟</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --accent: #22d3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1d4ed8, var(--bg1) 40%, #020617 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    .card {
      width: min(92vw, 720px);
      padding: 40px 28px;
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      text-align: center;
      border: 1px solid rgba(255,255,255,.12);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: .06em;
    }
    .time {
      font-size: clamp(46px, 11vw, 110px);
      font-weight: 800;
      letter-spacing: .06em;
      color: white;
      text-shadow: 0 0 24px rgba(34,211,238,.35);
      margin: 10px 0 8px;
      font-variant-numeric: tabular-nums;
    }
    .date {
      font-size: clamp(16px, 2.4vw, 24px);
      color: #cbd5e1;
    }
    .dot {
      color: var(--accent);
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: .3; }
    }
    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>实时时钟</h1>
    <div class="time" id="time">00<span class="dot">:</span>00<span class="dot">:</span>00</div>
    <div class="date" id="date">----年--月--日 星期-</div>
    <div class="footer">自动按您的设备本地时间刷新</div>
  </main>

  <script>
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function renderClock() {
      const now = new Date();
      const h = pad(now.getHours());
      const m = pad(now.getMinutes());
      const s = pad(now.getSeconds());
      const y = now.getFullYear();
      const mon = pad(now.getMonth() + 1);
      const d = pad(now.getDate());
      const w = weekdays[now.getDay()];
      timeEl.innerHTML = `${h}<span class="dot">:</span>${m}<span class="dot">:</span>${s}`;
      dateEl.textContent = `${y}年${mon}月${d}日 ${w}`;
    }

    renderClock();
    setInterval(renderClock, 1000);
  </script>
</body>
</html>
